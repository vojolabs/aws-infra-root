name: "[PROD] deploy"

on: 
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  terraform-deploy:
    uses: ./.github/workflows/terraform.yml
    with:
      environment: prod
      id_aws_account_prod: "910972978278"
      project_name: "cidade-refugio-backend"
      aws-statefile-s3-bucket: "cidade-refugio-backend-terraform-state-910972978278"
      aws-region: "sa-east-1"
    secrets: inherit