name: "[PROD] deploy"

on: 
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    with:
      environment: prod
      project_name: "cidade-refugio-backend"
      # No primeiro deploy (para criar a role), deixe esta linha vazia ou comentada:
      # aws-assume-role-arn: "" 
      aws-region: "sa-east-1"
    secrets: inherit # CRITÍCO: Isso passa as AWS_ACCESS_KEY para o workflow filho